<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vibe tags</title>
</head>
<body>  
    <details>
        <summary>click me</summary>
        <p>this is a paragraph</p>
